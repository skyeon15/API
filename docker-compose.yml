services:
  # 1. 개발용 DB (Postgres 18)
  db:
    image: postgres:18-alpine
    container_name: pds-db-dev
    restart: always
    volumes:
      - pds-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=devpass
      - POSTGRES_DB=pds_api
      - PGDATA=/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d pds_api"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pds-network

  # 2. 개발용 Redis (Cache/Session)
  redis:
    image: redis:7-alpine
    container_name: pds-redis-dev
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - pds-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pds-network

  # 3. 내 모노레포 코드 (API + Web)
  app:
    image: node:24
    container_name: pds-monorepo-dev
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    command: npm run dev
    ports:
      - "10150:10150" # Web
      - "10151:10151" # API
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pds-network

networks:
  pds-network:
    driver: bridge

volumes:
  pds-db-data:
  pds-redis-data:
