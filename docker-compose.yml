services:
  # 1. 개발용 DB (Postgres 18)
  db:
    image: postgres:18-alpine
    container_name: pds-db-dev
    restart: always
    volumes:
      - pds-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=devpass
      - POSTGRES_DB=pds_api
      - PGDATA=/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d pds_api"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pds-network

  # 2. 개발용 Redis (Cache/Session)
  redis:
    image: redis:7-alpine
    container_name: pds-redis-dev
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - pds-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pds-network

  # 3. 내 모노레포 코드 (API + Web)
  # 실행: ./scripts/compose-doppler.sh up
  # (스크립트가 Doppler에서 .env.runtime을 생성 후 compose에 주입.
  #  Doppler 대시보드에서 키 추가/삭제 시 이 파일 무수정으로 자동 반영됨.)
  app:
    image: node:24
    container_name: pds-monorepo-dev
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env.runtime
    # package.json의 dev 스크립트는 호스트 실행용으로 doppler run prefix가 붙어 있음.
    # 컨테이너 내부에서는 doppler CLI가 없고 env가 이미 주입되었으므로 turbo를 직접 호출.
    command: ["npx", "turbo", "dev"]
    ports:
      - "10150:10150" # Web
      - "10151:10151" # API
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pds-network

networks:
  pds-network:
    driver: bridge

volumes:
  pds-db-data:
  pds-redis-data:
