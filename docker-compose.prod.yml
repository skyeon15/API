services:
  db:
    image: 'postgres:18-alpine'
    platform: linux/arm64
    volumes:
      - 'pds-db-data:/var/lib/postgresql/data'
    environment:
      - 'POSTGRES_USER=${API_DB_USER:-admin}'
      - 'POSTGRES_PASSWORD=${API_DB_PASSWORD:-devpass}'
      - 'POSTGRES_DB=${API_DB_NAME:-pds_api}'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}'
      interval: 5s
      timeout: 20s
      retries: 10
  redis:
    image: 'redis:7-alpine'
    command: 'redis-server --appendonly yes'
    volumes:
      - 'pds-redis-data:/data'
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 20s
      retries: 10
  api:
    image: ghcr.io/skyeon15/api/api
    environment:
      - 'API_PORT=${API_PORT:-10151}'
      - 'API_ALLOWED_ORIGINS=${API_ALLOWED_ORIGINS:-https://*.bbforest.net,https://*.riri.li,https://*.hapbbi.com}'
      - 'API_DB_HOST=${API_DB_HOST:-db}'
      - 'API_DB_PORT=${API_DB_PORT:-5432}'
      - 'API_DB_NAME=${API_DB_NAME:-pds_api}'
      - 'API_DB_USER=${API_DB_USER:-admin}'
      - 'API_DB_PASSWORD=${API_DB_PASSWORD:-devpass}'
      - 'API_JWT_SECRET=${API_JWT_SECRET}'
      - 'API_ALIGO_API_KEY=${API_ALIGO_API_KEY}'
      - 'API_ALIGO_USER_ID=${API_ALIGO_USER_ID}'
      - 'API_ALIGO_FAILOVER=${API_ALIGO_FAILOVER:-Y}'
      - 'API_PAYAPP_USERID=${API_PAYAPP_USERID}'
      - 'API_PAYAPP_LINKKEY=${API_PAYAPP_LINKKEY}'
      - 'API_PAYAPP_RESELLERID=${API_PAYAPP_RESELLERID:-pds1015}'
      - 'API_REDIS_HOST=redis'
      - 'API_REDIS_PORT=6379'
    depends_on:
      db:
        condition: service_healthy
  web:
    image: ghcr.io/skyeon15/api/web
    depends_on:
      - api

volumes:
  pds-db-data:
  pds-redis-data:
