services:
  db:
    image: 'postgres:18-alpine'
    platform: linux/arm64
    volumes:
      - 'pds-db-data:/var/lib/postgresql/data'
    env_file:
      - .env.prod
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}'
      interval: 5s
      timeout: 20s
      retries: 10
  redis:
    image: 'redis:7-alpine'
    command: 'redis-server --appendonly yes'
    volumes:
      - 'pds-redis-data:/data'
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 20s
      retries: 10
  api:
    image: ghcr.io/skyeon15/api/api
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
  web:
    image: ghcr.io/skyeon15/api/web
    env_file:
      - .env.prod
    depends_on:
      - api

volumes:
  pds-db-data:
  pds-redis-data:
