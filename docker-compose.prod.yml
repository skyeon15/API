services:
  db:
    image: postgres:17-alpine
    container_name: pds-api-db
    restart: always
    environment:
      POSTGRES_DB: ${API_DB_NAME:-pds_api}
      POSTGRES_USER: ${API_DB_USER:-pds_user}
      POSTGRES_PASSWORD: ${API_DB_PASSWORD:-pds_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # 프로덕션에서는 DB 포트를 외부로 노출하지 않는 것이 보안상 좋습니다.
    # 필요한 경우에만 주석을 해제하세요.
    # ports:
    #   - "1017:5432"
    networks:
      - pds-network

  app:
    image: ghcr.io/bluebambooforest/api/api:latest
    container_name: pds-api-app
    restart: always
    ports:
      - "${API_PORT:-10151}:${API_PORT:-10151}"
    environment:
      API_DB_HOST: db
      API_DB_PORT: 5432
      API_DB_NAME: ${API_DB_NAME:-pds_api}
      API_DB_USER: ${API_DB_USER:-pds_user}
      API_DB_PASSWORD: ${API_DB_PASSWORD:-pds_password}
      API_REDIS_HOST: redis
      API_REDIS_PORT: 6379
      API_PORT: ${API_PORT:-10151}
      API_ALLOWED_ORIGINS: ${API_ALLOWED_ORIGINS:-https://*.bbforest.net,https://*.riri.li,https://*.hapbbi.com}
    depends_on:
      - db
      - redis
    networks:
      - pds-network

  redis:
    image: redis:7.4-alpine
    container_name: pds-api-redis
    restart: always
    volumes:
      - redisdata:/data
    networks:
      - pds-network

  web:
    image: ghcr.io/bluebambooforest/api/web:latest
    container_name: pds-web-app
    restart: always
    ports:
      - "10150:10150"
    environment:
      API_NEXT_PUBLIC_API_URL: ${API_API_URL:-http://localhost:10151}
    networks:
      - pds-network

volumes:
  pgdata:

networks:
  pds-network:
    driver: bridge
